<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="version" content="1780925105">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Addtok</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'%3E%3Crect width='60' height='60' rx='13' fill='%23161830'/%3E%3Ctext x='30' y='37' text-anchor='middle' font-family='DM Sans,Arial Black,sans-serif' font-size='30' font-weight='800' fill='%23ffffff'%3EA%3C/text%3E%3Crect x='8' y='43' width='20' height='4' rx='2' fill='%23FF2D55'/%3E%3Crect x='31' y='43' width='20' height='4' rx='2' fill='%2300e5ff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a3a;
  --card:#22224a;
  --card2:#2a2a58;
  --border:rgba(255,255,255,0.1);
  --red:#ff2d55;--cyan:#00e5ff;--gold:#ffd60a;--green:#30d158;
  --text:#f2f2f7;--t2:rgba(242,242,247,0.7);--t3:rgba(242,242,247,0.4);
  --fb:'DM Sans',sans-serif;
  --r:12px;--r2:18px;
  --c1: #1a1a3a;
  --c2: #1e1e3e;
  --bo: rgba(255,255,255,.08);
  --cy: #00e5ff;
  --gr: #30d158;
  --gd: #ffd60a;
  --rd: #FF2D55;
  --pu: #bf5af2;
  --tx: #f2f2f7;
  --or: #ff9f0a;
  --bl: #0a84ff;
  --f: 'DM Sans', sans-serif;
  --fm: 'DM Sans', sans-serif;

}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;border:none;background:none;font-family:var(--fb);color:inherit}
::-webkit-scrollbar{display:none}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100dvh}
.topbar{position:fixed;top:0;left:0;right:0;background:rgba(13,13,26,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow:hidden}.topbar-main{display:flex;align-items:center;padding:8px 14px;gap:10px;min-height:52px;width:100%}
.content{flex:1;overflow:hidden;position:relative}
.page{position:fixed;top:112px;left:0;right:0;bottom:60px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.page.active,.page.active,.page.active,.page.on{display:block}
.page.active{display:block}
.bottom-nav{height:64px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}

/* TOPBAR */
.tb-search{flex:1;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:9px 16px;color:var(--text);font-size:14px;outline:none}
.tb-search::placeholder{color:var(--t3)}
.tb-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* BOTTOM NAV */
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--t3);font-family:var(--f);padding:6px 0;min-width:0}
.bn-icon{font-size:22px;line-height:1}
.bn-label{font-size:10px;font-weight:600;color:var(--t3)}
.bn.active .bn-label{color:var(--cyan)}
.bn.on .bn.on .bnl{color:var(--rd)}
.bn.on .bn.on .bni{filter:drop-shadow(0 0 4px var(--rd))}
.bn.active .bn-icon{transform:scale(1.08)}

/* FILTER PILLS */
.pill-row{display:flex;gap:8px;overflow-x:auto;padding:14px 18px 12px;flex-shrink:0;background:var(--bg)}
.pill-row::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:24px;font-size:12px;font-weight:600;white-space:nowrap;border:1.5px solid var(--border);color:var(--t2);flex-shrink:0;transition:all .15s}
.pill.active{background:var(--red);border-color:var(--red);color:#fff}

/* AD CARD */
.feed{padding:0 18px 90px}
.ad{background:var(--card);border-radius:var(--r2);overflow:hidden;margin-bottom:18px}
.ad-thumb{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;cursor:pointer}
.ad-type{position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:20px;color:#fff}
.t-m{background:rgba(124,58,237,.8)}
.t-s{background:rgba(8,145,178,.8)}
.t-i{background:rgba(219,39,119,.8)}
.t-b{background:rgba(180,83,9,.8)}
.ad-feat{position:absolute;top:12px;right:12px;font-size:16px}
.ad-grade{position:absolute;bottom:12px;right:12px;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
.gA{background:#30d158;color:#000}.gB{background:#00e5ff;color:#000}.gC{background:#ffd60a;color:#000}
.ad-body{padding:16px}
.ad-title{font-size:15px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px;line-height:1.35}
.ad-creator{display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer}
.creator-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.creator-name{font-size:13px;font-weight:600}
.creator-tag{font-size:10px;color:var(--cyan);margin-left:auto}
.ad-desc{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:12px}
.ad-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--card2);color:var(--t2)}
.approval-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.approval-bar{flex:1;height:4px;background:var(--card2);border-radius:2px;overflow:hidden}
.approval-fill{height:100%;border-radius:2px}
.approval-pct{font-size:11px;font-weight:600;flex-shrink:0}
.ad-stats{display:flex;gap:16px;margin-bottom:16px}
.stat{font-size:12px;color:var(--t3)}
.stat b{color:var(--t2);font-weight:600}
.ad-actions{display:flex;gap:10px;align-items:center}
.vote-group{display:flex;background:var(--card2);border-radius:24px;overflow:hidden}
.vbtn{padding:9px 14px;font-size:13px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:4px}
.vbtn.voted-up{color:var(--red)}
.vbtn.voted-down{color:#60a5fa}
.vdiv{width:1px;background:var(--border)}
.visit{flex:1;background:var(--cyan);color:#000;border-radius:24px;padding:10px 16px;font-size:13px;font-weight:700;text-align:center}
.act-btn{width:38px;height:38px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.act-btn.saved{background:rgba(255,214,10,.15);border:1px solid rgba(255,214,10,.3)}

/* SPECIAL CARDS */
.aotd{background:var(--card);border:2px solid rgba(255,214,10,.4);border-radius:var(--r2);margin-bottom:18px;overflow:hidden}
.aotd-badge{background:linear-gradient(90deg,rgba(255,214,10,.2),rgba(255,45,85,.1));padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,214,10,.2)}
.aotd-badge .label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
.aotd-body{display:flex;gap:14px;padding:16px}
.aotd-thumb{width:72px;height:72px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
.aotd-info{flex:1;min-width:0}
.aotd-title{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aotd-sub{font-size:11px;color:var(--t3);margin-bottom:10px}
.aotd-visit{background:var(--gold);color:#000;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;display:inline-block}
.aotd-timer{padding:10px 16px;font-size:11px;color:var(--t3);border-top:1px solid rgba(255,214,10,.15);display:flex;align-items:center;gap:6px}

.battle{background:var(--card);border-radius:var(--r2);margin-bottom:18px;overflow:hidden}
.battle-top{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.battle-sides{display:grid;grid-template-columns:1fr 1fr}
.bside{padding:16px 14px;cursor:pointer;text-align:center;position:relative}
.bside:first-child{border-right:1px solid var(--border)}
.bside.win{background:rgba(48,209,88,.05)}
.bside .b-emoji{font-size:40px;margin-bottom:8px;display:block}
.bside .b-name{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.bside .b-votes{font-size:20px;font-weight:800;color:var(--gold)}
.bside .b-pct{font-size:10px;color:var(--t3);margin-top:2px}
.b-crown{position:absolute;top:8px;right:8px;font-size:14px}
.battle-bar{height:5px;display:flex}
.bb-left{background:var(--red);transition:width .5s}
.bb-right{background:var(--cyan);transition:width .5s}
.battle-foot{padding:10px 16px;font-size:11px;color:var(--t3);text-align:center;border-top:1px solid var(--border)}

/* DROP TIMER */
.drop-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.18);border-radius:10px;padding:8px 12px}
.drop-label{font-size:10px;font-weight:700;color:var(--red);letter-spacing:.5px;flex-shrink:0}
.drop-units{display:flex;gap:5px;align-items:center}
.du{background:var(--card2);border-radius:8px;padding:4px 8px;text-align:center;min-width:36px}
.du-num{font-size:14px;font-weight:800;color:var(--gold);line-height:1}
.du-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}
.du-sep{font-size:14px;color:var(--red);font-weight:800}

/* BOUGHT BTN */
.bought{background:rgba(48,209,88,.1);border:1.5px solid rgba(48,209,88,.25);color:var(--green);border-radius:24px;padding:9px 13px;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s}
.bought.done{background:rgba(48,209,88,.2);border-color:var(--green)}

/* LEADERBOARD */
.lb-page{padding:18px 18px 90px}
.lb-hero{background:var(--card);border-radius:var(--r2);padding:20px 16px;margin-bottom:18px;text-align:center}
.lb-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto}
.lb-tabs::-webkit-scrollbar{display:none}
.lbt{padding:8px 18px;border-radius:24px;font-size:12px;font-weight:700;border:1.5px solid var(--border);color:var(--t2);flex-shrink:0;white-space:nowrap}
.lbt.active{background:var(--gold);border-color:var(--gold);color:#000}
.lb-item{background:var(--card);border-radius:var(--r2);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer}
.lb-rank{font-size:20px;font-weight:800;width:28px;text-align:center;flex-shrink:0}
.lb-img{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.lb-sub{font-size:10px;color:var(--t3)}
.lb-score{font-size:15px;font-weight:800;color:var(--gold);flex-shrink:0;text-align:right}
.shame-section{margin-top:24px}
.shame-item{background:var(--card);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;opacity:.75}

/* SEARCH */
.search-page{padding:18px 18px 90px}
.search-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;margin-bottom:20px}
.search-input:focus{border-color:var(--red)}
.search-input::placeholder{color:var(--t3)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.cat{border-radius:var(--r2);padding:18px 14px;cursor:pointer;transition:transform .15s;display:flex;align-items:center;gap:12px}
.cat:active{transform:scale(.98)}
.cat-icon{font-size:30px;flex-shrink:0}
.cat-name{font-size:14px;font-weight:700}
.cat-count{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}

/* SAVED */
.saved-page{padding:18px 18px 90px}
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:54px;margin-bottom:16px}
.empty-title{font-size:17px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--t3);line-height:1.6}

/* PROFILE */
.profile-page{padding:18px 18px 90px}
.prof-hero{background:var(--card);border-radius:var(--r2);padding:24px 20px;margin-bottom:16px;text-align:center}
.prof-av{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--red),#9d4dff);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:28px}
.prof-name{font-size:18px;font-weight:800;margin-bottom:4px}
.prof-sub{font-size:13px;color:var(--t3);margin-bottom:18px}
.prof-btn{padding:11px 28px;border-radius:14px;font-size:14px;font-weight:700;width:100%;margin-bottom:10px}
.pb-primary{background:var(--red);color:#fff}
.pb-secondary{background:var(--card2);color:var(--text)}
.prof-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.pstat{background:var(--card);border-radius:var(--r);padding:12px;text-align:center}
.pstat-val{font-size:20px;font-weight:800;color:var(--gold)}
.pstat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.menu{background:var(--card);border-radius:var(--r2);overflow:hidden}
.menu-item{display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid var(--border);cursor:pointer}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:var(--card2)}
.mi-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0}
.mi-label{flex:1;font-size:14px;font-weight:500}
.mi-arrow{color:var(--t3);font-size:18px}

/* SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end}
.sheet-bg.open{display:flex}
.sheet{background:var(--card);border-radius:24px 24px 0 0;border-top:2px solid var(--red);width:100%;max-height:90dvh;overflow-y:auto;padding:16px 18px 40px}
.sheet-handle{width:44px;height:4px;background:linear-gradient(90deg,var(--red),var(--cyan));border-radius:2px;margin:0 auto 18px}
.sheet-img{width:100%;height:200px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:80px;margin-bottom:16px}
.sheet-creator{display:flex;align-items:center;gap:10px;background:var(--card2);border-radius:12px;padding:12px;margin-bottom:16px;cursor:pointer}
.sheet-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.ss{background:var(--card2);border-radius:10px;padding:12px;text-align:center}
.ss-val{font-size:17px;font-weight:800;color:var(--gold)}
.ss-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.sheet-foot{display:flex;gap:10px}
.sheet-vote{display:flex;background:var(--card2);border-radius:24px;overflow:hidden}
.sheet-visit{flex:1;background:var(--cyan);color:#000;border-radius:24px;padding:12px;font-size:14px;font-weight:800;text-align:center}

/* ADVERTISER PAGE */
.adv-page{padding-bottom:90px}
.adv-cover{height:130px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative}
.adv-top{padding:0 18px 18px;border-bottom:1px solid var(--border)}
.adv-av{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;border:3px solid var(--bg);margin-top:-36px;margin-bottom:10px}
.adv-follow{background:var(--cyan);color:#000;border-radius:24px;padding:9px 22px;font-size:13px;font-weight:800;float:right;margin-top:-52px}
.adv-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.badge{font-size:9px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.5px}
.b-v{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}
.b-t{background:rgba(255,45,85,.1);color:var(--red);border:1px solid rgba(255,45,85,.2)}
.adv-stats{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(255,45,85,.04)}
.avs{flex:1;text-align:center;padding:14px 8px}
.avs:not(:last-child){border-right:1px solid var(--border)}
.avs-val{font-size:18px;font-weight:800;color:var(--gold)}
.avs-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.adv-ads{padding:18px}

/* NOTIFS */
.notif-page{padding:18px 18px 90px}
.notif-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.notif-item:last-child{border-bottom:none}
.ni-icon{width:40px;height:40px;border-radius:12px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ni-title{font-size:13px;font-weight:600;margin-bottom:3px}
.ni-desc{font-size:12px;color:var(--t2);line-height:1.5}
.ni-time{font-size:10px;color:var(--t3);margin-top:4px}

/* TOAST */
.tc{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;width:calc(100% - 36px);max-width:340px}
.tst{background:var(--card);border-radius:14px;padding:11px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;animation:tIn .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.5);margin-bottom:6px}
.tst.suc{border:1px solid rgba(48,209,88,.35);color:var(--green)}
.tst.info{border:1px solid rgba(0,229,255,.35);color:var(--cyan)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{to{opacity:0;transform:translateY(8px)}}

.bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,26,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);height:60px;z-index:100;overflow:visible}
.bn{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;padding:6px 0}
.bni{font-size:20px;line-height:1}
.bnl{font-size:9px;font-weight:600;color:rgba(242,242,247,.4);letter-spacing:.3px;text-transform:uppercase}
.bn.on .bn.on .bnl{color:var(--rd)}
.sbo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s}
.sbo.on{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:91;transform:translateY(100%);transition:transform .3s;padding:20px;max-height:80vh;overflow-y:auto}
.pts-strip{position:fixed;top:var(--topbar-height,80px);left:0;right:0;background:rgba(13,13,26,.9);backdrop-filter:blur(10px);padding:6px 16px;font-size:12px;font-weight:600;color:rgba(242,242,247,.7);display:flex;align-items:center;gap:6px;z-index:99;border-bottom:1px solid rgba(255,255,255,.05)}
.streak-sep{color:rgba(255,255,255,.2)}

.btl{background:var(--card);border:1px solid rgba(99,91,255,.3);border-radius:16px;padding:14px;margin-bottom:12px}
.btl-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.btl-sides{display:flex;gap:8px}
.bs{flex:1;background:var(--card2);border:2px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;position:relative;transition:all .15s}
.bs.win{border-color:var(--gold);background:rgba(255,214,10,.06)}
.bs:active{transform:scale(.97)}
.be{font-size:28px;display:block;margin-bottom:6px}

// Heat score: weighted combo of votes, reactions, clicks, approval
function heatScore(ad){
  var v=(ad.vu||0)*2;
  var c=(ad.clicks||0)*1.5;
  var a=(ad.appr||0)*0.8;
  var r=0;
  if(typeof RXNS!=='undefined'&&S.rxn){
    for(var i=0;i<RXNS.length;i++){
      var k=ad.id+'-'+RXNS[i].key;
      r+=(S.rxn[k]||0);
    }
  }
  var raw=Math.min(100,Math.round((v+c+a+r*3)/1200));
  return Math.max(raw,12);
}
function heatColor(score){
  if(score>=80)return'#ff2d55';
  if(score>=60)return'#ff9f0a';
  if(score>=40)return'#ffd60a';
  return'#00e5ff';
}

function doReact(adId,rkey,btnEl){
  adId=parseInt(adId)||adId;
  var key=adId+'-'+rkey;
  var r=null;
  for(var i=0;i<RXNS.length;i++){if(RXNS[i].key===rkey){r=RXNS[i];break;}}
  if(!r)return;
  if(S.rxnVoted[key]){
    if(S.rxn[key]>0)S.rxn[key]--;
    delete S.rxnVoted[key];
  }else{
    S.rxn[key]=(S.rxn[key]||0)+1;
    S.rxnVoted[key]=1;
    addPoints(5);
    spawnRxnBurst(r.em,btnEl);
  }
  saveState();rp(S.pg);
}
function spawnRxnBurst(em,el){
  var b=document.createElement('div');
  b.className='rxn-burst';b.textContent=em;
  var x=window.innerWidth/2-13,y=window.innerHeight/2;
  try{var rc=el.getBoundingClientRect();x=rc.left+rc.width/2-13;y=rc.top-10;}catch(e){}
  b.style.cssText='position:fixed;left:'+x+'px;top:'+y+'px;z-index:500;font-size:26px;pointer-events:none;animation:rxnFloat 1.1s ease-out forwards';
  document.body.appendChild(b);
  setTimeout(function(){if(b.parentNode)b.parentNode.removeChild(b);},1200);
}

  if(el){el.classList.add('active');el.classList.add('on');}

  for(var i=0;i<bns.length;i++)bns[i].classList.remove('on');

function filtered(){
  var a=ADS.slice();
  // Apply AI personalisation only on the main feed (no active filter/search)
  if (S.ff === 'all' && !S.sq) {
    a = aiPersonalisedFeed(a);
  }
  if(S.sq){var q=S.sq.toLowerCase();a=a.filter(function(x){return x.title.toLowerCase().indexOf(q)>=0||x.adv.toLowerCase().indexOf(q)>=0||x.tags.some(function(t){return t.indexOf(q)>=0;});});}
  if(S.ff==='trending')a.sort(function(x,y){return(y.vu-y.vd)-(x.vu-x.vd);});
  else if(S.ff==='drops'){a=a.filter(function(x){return !!x.drop;});}
  else if(S.ff==='featured'){a=a.filter(function(x){return !!x.feat;});}
  else if(S.ff==='clicked')a.sort(function(x,y){return y.clicks-x.clicks;});
  else if(S.ff==='featured')a=a.filter(function(x){return x.feat;});
  else if(S.ff!=='all')a=a.filter(function(x){return x.type===S.ff;});
  return a;
}

function aotdCard(){
  // AI auto-selects highest scoring ad
  var aprRate=function(a){return (a.vu+a.vd)>0?Math.round(a.vu/(a.vu+a.vd)*100):0;};
  var candidates=ADS.filter(function(a){return aprRate(a)>=75&&a.vu>500;});
  if(!candidates.length)candidates=ADS.slice();
  candidates.sort(function(a,b){
    var sa=aprRate(a)*0.4+(a.vu||0)*0.003+heatScore(a)*0.3;
    var sb=aprRate(b)*0.4+(b.vu||0)*0.003+heatScore(b)*0.3;
    return sb-sa;
  });
  var ad=candidates[0];
  if(!ad)return '';
  var adAppr=aprRate(ad);
  return '<div class="aotd">'+
    '<div class="aotdb"><span>&#11088;</span><span class="lbl">Ad of the Day</span>'+
    '<span style="font-size:10px;color:var(--t3);margin-left:auto">AI selected &#183; '+ad.appr+'% approval</span></div>'+
    '<div class="inner" style="background:'+ad.bg+'">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
        '<div style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:24px">'+ad.em+'</div>'+
        '<div><div style="font-size:15px;font-weight:800;color:#fff">'+ad.title+'</div>'+
        '<div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px">'+ad.adv+'</div></div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:10px">'+
        '<span class="heat-badge">&#128293; '+heatScore(ad)+'</span>'+
        '<span style="background:rgba(255,255,255,.1);border-radius:20px;padding:2px 8px;font-size:11px;color:rgba(255,255,255,.8)">&#128077; '+ad.vu.toLocaleString()+'</span>'+
        '<span style="background:rgba(48,209,88,.15);border-radius:20px;padding:2px 8px;font-size:11px;color:#30d158">'+adAppr+'%</span>'+
      '</div>'+
      '<button onclick="visitAd('+ad.id+')" style="width:100%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Visit Product &#8594;</button>'+
    '</div>'+
  '</div>';
}

function stockBar(ad){
  if(!ad.stock)return '';
  var left=ad.stockLeft||0;
  var total=ad.stock;
  var pct=Math.round(left/total*100);
  var isSO=left===0;
  var isLow=!isSO&&pct<=20;
  var labelHtml=isSO?'<span style="color:var(--t3)">&#128683; Sold out</span>':
    left<=5?'<span style="color:var(--rd)">&#9889; Only '+left+' left!</span>':
    isLow?'<span style="color:var(--rd)">&#128293; '+left+' remaining</span>':
    pct<=40?'<span style="color:var(--gd)">'+left+' left</span>':
    '<span style="color:var(--gr)">'+left+' in stock</span>';
  var barColor=isSO?'rgba(255,255,255,.15)':isLow?'var(--rd)':pct<=40?'var(--gd)':'var(--gr)';
  return '<div style="padding:2px 0 6px">'+
    '<div style="font-size:10px;font-weight:700;display:flex;justify-content:space-between;margin-bottom:3px">'+
      '<span style="color:var(--t3);letter-spacing:.5px">STOCK</span>'+labelHtml+
    '</div>'+
    '<div style="height:3px;border-radius:2px;background:rgba(255,255,255,.1)">'+
      '<div style="height:100%;width:'+pct+'%;border-radius:2px;background:'+barColor+'"></div>'+
    '</div></div>';
}

function vote(id,dir){
  var ad=ADS.filter(function(a){return a.id===id;})[0];if(!ad)return;
  // Reset daily vote count if new day
  var today=new Date().toDateString();
  if(S.dailyVoteDate!==today){S.dailyVotes=0;S.dailyVoteDate=today;}
  // Allow un-voting but cap new votes at 20/day
  var isNewVote=!S.voted[id]||S.voted[id]!==dir;
  if(isNewVote&&!S.voted[id]&&S.dailyVotes>=20){
    toast('Daily vote limit reached (20/day). Come back tomorrow!','w');return;
  }
  if(S.voted[id]===dir){
    ad[dir==='up'?'vu':'vd']--;delete S.voted[id];
  } else {
    if(S.voted[id])ad[S.voted[id]==='up'?'vu':'vd']--;
    ad[dir==='up'?'vu':'vd']++;
    S.voted[id]=dir;
    if(!S.voted[id]){}else S.dailyVotes++;
    if(dir==='up'){
      addPointsMult(2,'Voted on ad');
      ad.appr=(ad.vu+ad.vd)>0?Math.round(ad.vu/(ad.vu+ad.vd)*100):0;
      if(!S.challengeDone){
        S.challengeProgress=(S.challengeProgress||0)+1;
        if(S.challengeProgress>=5){
          S.challengeDone=true;
          addPoints(50,'Weekly challenge complete!');
          toast('Challenge complete! +50pts','s');
        } else {
          toast('Voted! +2pts · Challenge: '+S.challengeProgress+'/5','s');
        }
      } else {
        toast('Voted! +2pts','s');
      }
    }
  }
  saveState();
  buildTicker();
  rp(S.pg);
  aiAutoUpdateLeaderboard();
}
function visitAd(id){
  var ad=ADS.filter(function(a){return a.id===id;})[0];
  if(ad){
    ad.clicks++;
    decrementStock(ad);
    // Points only on first visit per ad per day
    var today=new Date().toDateString();
    var visitKey=String(id);
    var alreadyVisited=S.dailyVisits[visitKey]===today;
    if(!alreadyVisited){
      S.dailyVisits[visitKey]=today;
      addPoints(10,'Visited product');
      toast('Opening product page… +10 pts','i');
    } else {
      toast('Opening product page…','i');
    }
  }
  closeSheet();
  saveState();
}

function weeklyAwards(){

  var creative=live.slice().sort(function(a,b){return (b.vu+b.vd)-(a.vu+a.vd);})[0]||live[0];

  var bestDeal=live.slice().sort(function(a,b){return (b.deal?20:0)-(a.deal?20:0)||(b.appr-a.appr);})[0]||live[1%live.length];

  var commFave=live.slice().sort(function(a,b){return (b.appr||0)-(a.appr||0);})[0]||live[2%live.length];
  // New but rising = Rising Star (good appr, low votes = newer)
  var rising=live.slice().sort(function(a,b){

    var sb=(b.appr||0)*2-(b.vu||0)*0.01;

  }).filter(function(a){return a.id!==commFave.id;})[0]||live[3%live.length];

  var awards=[
    {em:'&#127942;',label:'Most Creative',adv:creative.adv,adEm:creative.em,bg:creative.bg,score:creative.vu.toLocaleString()+' votes'},

    {em:'&#127775;',label:'Rising Star',adv:rising.adv,adEm:rising.em,bg:rising.bg,score:'Trending this week'},
  ];
  var h='<div class="card" style="margin-bottom:14px">'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+
      '<span style="font-size:18px">&#127885;</span>'+

      '<span style="font-size:10px;color:var(--t3);margin-left:auto">AI selected</span>'+
    '</div>';
  for(var i=0;i<awards.length;i++){
    var aw=awards[i];
    h+='<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:12px;margin-bottom:8px">'+

      '<div style="font-size:10px;color:var(--t3)">'+aw.score+'</div>'+
    '</div>';
  }
  h+='</div>';
  return h;
}

function setupDiscSwipe(el){
  var sx=0,sy=0;
  el.ontouchstart=function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;};
  el.ontouchend=function(e){
    var dx=e.changedTouches[0].clientX-sx;
    var dy=e.changedTouches[0].clientY-sy;
    var idx=S.discIdx||0;
    var ad=ADS[idx%ADS.length];
    if(Math.abs(dx)>Math.abs(dy)){
      if(dx<-50){S.discIdx=(idx+1)%ADS.length;renderDisc(ADS[S.discIdx],S.discIdx);}
      else if(dx>50){S.discIdx=(idx-1+ADS.length)%ADS.length;renderDisc(ADS[S.discIdx],S.discIdx);}
    } else {
      if(dy<-50){visitAd(ad.id);closeDisc();}
      else if(dy>50){discSave(ad.id);renderDisc(ADS[S.discIdx],S.discIdx);}
    }
  };
}

var _swipeSetup=false;
function setupDiscSwipe(){
  if(_swipeSetup)return;
  _swipeSetup=true;
  var el=document.getElementById('disc-inner');
  if(!el)return;

  el.addEventListener('touchstart',function(e){
    _swipeStartX=e.touches[0].clientX;
    _swipeStartY=e.touches[0].clientY;
    _swipeStartTime=Date.now();
  },{passive:true});

  el.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-_swipeStartX;
    var dy=e.changedTouches[0].clientY-_swipeStartY;
    var dt=Date.now()-_swipeStartTime;
    var absDx=Math.abs(dx);
    var absDy=Math.abs(dy);

    // Must be fast enough and travel far enough to count as swipe
    if(dt>500)return;

    if(absDx>60&&absDx>absDy){
      // Horizontal swipe
      if(dx>0){
        // Swipe RIGHT - previous ad
        discPrev();
      }else{
        // Swipe LEFT - next ad
        discNext();
      }
    }else if(absDy>80&&absDy>absDx){
      // Swipe UP - visit product
      if(dy<0){
        var ad=discAds[discIdx];
        if(ad){visitAd(ad.id);addPoints(10);toast('Visiting +10pts','s');}
      }
      // Swipe DOWN - save
      if(dy>0){
        var ad=discAds[discIdx];
        if(ad){toggleSave(ad.id);addPoints(3);}
      }
    }else if(absDx<15&&absDy<15&&dt<250){
      // Tap - next ad
      discNext();
    }
  },{passive:true});
}

function showTooltip(idx){
  if(!document.getElementById('ob-tooltip'))return;
  if(idx>=OB_TOOLTIPS.length){hideTooltip();return;}
  var t=OB_TOOLTIPS[idx];
  var el=document.querySelector(t.sel);
  if(!el){obTTStep++;showTooltip(obTTStep);return;}
  var rect=el.getBoundingClientRect();
  var tt=document.getElementById('ob-tooltip');
  var bd=document.getElementById('ob-tt-backdrop');
  var _ob_ob_tt_title=document.getElementById('ob-tt-title');if(_ob_ob_tt_title)_ob_ob_tt_title.textContent=t.title;

  var _ob_ob_tt_count=document.getElementById('ob-tt-count');if(_ob_ob_tt_count)_ob_ob_tt_count.textContent=(idx+1)+' of '+OB_TOOLTIPS.length;
  var _ob_ob_tt_btn=document.getElementById('ob-tt-btn');if(_ob_ob_tt_btn)_ob_ob_tt_btn.textContent=idx===OB_TOOLTIPS.length-1?'Done':'Next';
  // Smart positioning - avoid edges and nav bar
  var ttW=Math.min(window.innerWidth-16,260);
  var ttH=160;
  var ttLeft=Math.min(Math.max(rect.left+(rect.width/2)-(ttW/2),8),window.innerWidth-ttW-8);
  var ttTop;
  var spaceBelow=window.innerHeight-rect.bottom-80; // 80px for nav
  var spaceAbove=rect.top-70; // 70px for topbar
  if(t.pos==='bottom'||spaceBelow>=ttH){
    ttTop=rect.bottom+10;
  }else if(spaceAbove>=ttH){
    ttTop=rect.top-ttH-10;
  }else{
    // Centre on screen if neither fits
    ttTop=Math.round(window.innerHeight/2)-Math.round(ttH/2);
  }
  // Never overlap nav bar (bottom ~70px)
  if(ttTop+ttH>window.innerHeight-75){
    ttTop=window.innerHeight-ttH-80;
  }
  // Never go above topbar
  if(ttTop<65)ttTop=65;
  tt.style.top=ttTop+'px';
  tt.style.left=ttLeft+'px';
  tt.style.width=ttW+'px';
  tt.style.display='block';
  bd.style.display='block';
  // Highlight element
  el.style.outline='3px solid var(--rd)';
  el.style.borderRadius='10px';
  el.style.position='relative';
  el.style.zIndex='270';
}

function doSpin(){
  if(spinState.spinsLeft<=0){toast('No spins left today!','w');return;}
  if(spinState.spinning)return;
  spinState.spinning=true;
  var wheel=document.getElementById('spin-wheel');
  if(wheel){
    wheel.style.transform='rotate(720deg)';
    wheel.textContent='🎲';
  }
  setTimeout(function(){
    spinState.spinning=false;
    spinState.spinsLeft--;spinState.totalSpun=(spinState.totalSpun||0)+1;
    var pool=spinState.spinCat==='all'?ADS:ADS.filter(function(a){
      if(spinState.spinCat==='trending')return (a.vu-a.vd)>500;
      if(spinState.spinCat==='featured')return !!a.feat;
      if(spinState.spinCat==='drops')return !!a.drop;
      return a.type===spinState.spinCat;
    });
    if(!pool.length)pool=ADS;
    var idx=Math.floor(Math.random()*pool.length);
    spinState.result=pool[idx];
    addPoints(5);
    toast('You spun '+ADS[idx].em+' '+ADS[idx].title.split(' ').slice(0,3).join(' ')+'! +5 pts','s');
    rp('spin');
  },800);
}

function buildInterestProfile(){
  var cats={merch:0,sponsor:0,influencer:0,brand:0};
  for(var id in S.voted){
    var ad=ADS.filter(function(a){return a.id===parseInt(id);})[0];
    if(ad&&S.voted[id]==='up')cats[ad.type]=(cats[ad.type]||0)+1;
  }
  for(var i=0;i<S.saved.length;i++){
    var ad=ADS.filter(function(a){return a.id===S.saved[i];})[0];
    if(ad)cats[ad.type]=(cats[ad.type]||0)+2;
  }
  var top=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];}).filter(function(k){return cats[k]>0;});
  return top;
}

function tourneyVote(r,m,side){
  var match=TOURNAMENT.rounds[r].matches[m];
  if(match.done){toast('This match is already decided','i');return;}
  match[side].votes+=1;
  addPoints(5);
  var total=match.a.votes+match.b.votes;
  if(total>=10&&!match.done){
    match.done=1;
    var winner=match.a.votes>match.b.votes?match.a:match.b;
    match.winner=winner.name;
    toast(winner.name+' wins! They advance!','s');
    aiAdvanceTournamentBracket(r,m,winner);
  } else {
    var lead=match.a.votes>match.b.votes?match.a.name:match.b.name;
    toast('Vote cast! +5pts · '+lead+' leading','s');
  }
  saveState();
  rp('tournament');
}

function aiScoreAdStable(ad) {

var _aiFeedCache = null;
var _aiFeedCacheKey = '';

function aiPersonalisedFeed(ads) {
  var interactionCount = Object.keys(S.voted).length + S.saved.length;
  if (interactionCount < 3) return ads; // not enough data yet
  // Build cache key from vote/save counts - only recalculate when interactions change
  var cacheKey = Object.keys(S.voted).length + '-' + S.saved.length + '-' + S.pts;
  if (_aiFeedCache && _aiFeedCacheKey === cacheKey) {
    // Return cached order, just filter to match current ads array
    var cachedIds=(function(){var _r=[];for(var _ci=0;_ci<_aiFeedCache.length;_ci++)_r.push(_aiFeedCache[_ci].id);return _r;})();
    var result = [];
    for(var i=0;i<cachedIds.length;i++){
      var found = ads.filter(function(a){return a.id===cachedIds[i];})[0];
      if(found) result.push(found);
    }
    // Add any new ads not in cache
    for(var i=0;i<ads.length;i++){
      if(cachedIds.indexOf(ads[i].id)<0) result.push(ads[i]);
    }
    return result;
  }
  // Recalculate - use stable scores (no random element here)
  var scored=(function(){var _r=[];for(var _si=0;_si<ads.length;_si++)_r.push({ad:ads[_si],score:aiScoreAdStable(ads[_si])});return _r;})();
  scored.sort(function(a, b) { return b.score - a.score; });
  var result=(function(){var _r=[];for(var _ri=0;_ri<scored.length;_ri++)_r.push(scored[_ri].ad);return _r;})();
  _aiFeedCache = result;
  _aiFeedCacheKey = cacheKey;
  return result;
}

// Stable scoring (no Math.random) for feed order caching
function aiScoreAdStable(ad) {
  var score = 50;
  var interests = buildInterestProfile();
  for (var i = 0; i < interests.length; i++) {
    if (ad.type === interests[i]) score += 20;
  }
  if (!S.voted[ad.id] && S.saved.indexOf(ad.id)<0) score += 10;
  if (ad.appr >= 90) score += 15;
  else if (ad.appr >= 80) score += 10;
  if (ad.vu > 3000) score += 8;
  if (ad.deal) score += 12;
  if (ad.feat) score += 5;
  // Use ad ID as a stable tiebreaker (not random)
  score += (ad.id % 5);
  return score;
}

// AI Ad Recommendations - "Because you liked X"
function aiRecommendations(currentAdId) {
  var current = ADS.filter(function(a) { return a.id === currentAdId; })[0];
  if (!current) return [];
  // Find ads with matching type or tags
  var recs = ADS.filter(function(a) {
    return a.id !== currentAdId && (a.type === current.type || (a.appr >= 85));
  });
  // Sort by approval
  recs.sort(function(a, b) { return (b.appr || 0) - (a.appr || 0); });
  return recs.slice(0, 3);
}

// AI Sentiment Analyser - reads reaction patterns to score ad quality
function aiSentimentScore(ad) {
  var rxnKeys = ['fire','funny','wow','deal'];
  var positive = 0; var total = 0;
  for (var i = 0; i < rxnKeys.length; i++) {
    var k = ad.id + '-' + rxnKeys[i];
    var count = S.rxn && S.rxn[k] ? S.rxn[k] : 0;
    total += count;
    if (rxnKeys[i] === 'fire' || rxnKeys[i] === 'deal') positive += count;
    else if (rxnKeys[i] === 'wow') positive += count * 0.8;
    else if (rxnKeys[i] === 'funny') positive += count * 0.5;
  }
  if (total === 0) return null;
  return Math.round((positive / total) * 100);
}

var _supportReply_base = supportReply;
function supportReply(msg) {
  var m = msg.toLowerCase();
  for (var key in AI_SUPPORT_EXTENDED) {
    // Check if message contains the key words
    var words = key.split(' ');
    var matches = 0;
    for (var i = 0; i < words.length; i++) {

  }

function aiAdvanceTournamentBracket(roundIdx,matchIdx,winner){

  var nextMatchIdx=Math.floor(matchIdx/2);
  var nextSlot=matchIdx%2===0?'a':'b';
  if(nextRound.matches[nextMatchIdx]){
    nextRound.matches[nextMatchIdx][nextSlot]=winner;
  }
  var allDone=true;
  for(var m=0;m<TOURNAMENT.rounds[roundIdx].matches.length;m++){
    if(!TOURNAMENT.rounds[roundIdx].matches[m].done){allDone=false;break;}
  }
  if(allDone&&TOURNAMENT.currentRound===roundIdx){

    setTimeout(function(){toast(nextRound.name+' is now live!','i');},2000);
  }

function getVideoEmbed(url){
  if(!url)return null;
  // YouTube
  var ytMatch=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
  if(ytMatch)return {type:'youtube',id:ytMatch[1],embedUrl:'https://www.youtube.com/embed/'+ytMatch[1]+'?autoplay=1&rel=0&modestbranding=1'};
  // TikTok
  var ttMatch=url.match(/tiktok\.com\/@[^\/]+\/video\/(\d+)/);
  if(ttMatch)return {type:'tiktok',id:ttMatch[1],embedUrl:'https://www.tiktok.com/embed/v2/'+ttMatch[1]};
  // Vimeo
  var viMatch=url.match(/vimeo\.com\/(\d+)/);
  if(viMatch)return {type:'vimeo',id:viMatch[1],embedUrl:'https://player.vimeo.com/video/'+viMatch[1]+'?autoplay=1'};
  // Direct MP4/video
  if(url.match(/\.(mp4|webm|ogg)(\?|$)/i))return {type:'mp4',id:url,embedUrl:url};
  return null;
}

// ── TRENDING TICKER ──
var _tickerInt=0;
function buildTicker(){
  var el=document.getElementById('ticker-inner');
  if(!el)return;
  var sorted=ADS.slice().sort(function(a,b){return (b.vu+b.vd)-(a.vu+a.vd);});
  var fns=[
    function(a){return '\uD83D\uDD25 <b>'+a.title+'</b> trending &middot; '+fmt(a.vu+a.vd)+' votes';},
    function(a){return '\u26A1 <b>'+a.adv+'</b> &middot; '+fmt(a.views)+' views';},
    function(a){return '\u2B50 <b>'+a.adv+'</b> &middot; '+a.appr+'% community approval';},
    function(a){return '\uD83D\uDED2 '+fmt(a.bought)+' bought from <b>'+a.adv+'</b> today';},
  ];
  var html='';
  for(var i=0;i<sorted.length&&i<5;i++){
    html+='<span>'+fns[i%fns.length](sorted[i])+'</span>';
  }
  el.innerHTML=html;
  // Show ticker wrapper now that it has content
  var wrap=el.parentNode;
  if(wrap){wrap.style.opacity='1';wrap.style.maxHeight='20px';}
  // JS-driven scroll
  var pos=el.parentNode.offsetWidth||360;
  el.style.transform='translateX('+pos+'px)';
  if(window._tickerAnim)clearInterval(window._tickerAnim);
  var speed=0.6;
  var totalWidth=0;
  window._tickerAnim=setInterval(function(){
    totalWidth=totalWidth||el.offsetWidth;
    pos-=speed;
    if(pos<-totalWidth)pos=el.parentNode.offsetWidth||360;
    el.style.transform='translateX('+pos+'px)';
  },16);
}
window.buildTicker=buildTicker;
function startTicker(){
  buildTicker();
  clearInterval(_tickerInt);
  _tickerInt=setInterval(buildTicker,30000);
}
window.startTicker=startTicker;

startTicker();

// ── FOR YOU MATCH SCORE ──
function matchScore(ad){
  var interests=buildInterestProfile();
  if(!interests||interests.length===0||!ad.tags)return 50;
  var score=0;
  for(var i=0;i<ad.tags.length;i++){
    for(var j=0;j<interests.length;j++){
      if(interests[j].toLowerCase().indexOf(ad.tags[i].toLowerCase())>=0||
         ad.tags[i].toLowerCase().indexOf(interests[j].toLowerCase())>=0){
        score+=30;
      }
    }
  }
  // Base match on ad category vs S.ff preference
  if(S.ff!=='all'&&ad.type===S.ff)score+=20;
  // Boost for high approval
  if(ad.appr>90)score+=15;
  return Math.min(99,Math.max(0,score+50));
}
function matchBadge(ad){
  var pct=matchScore(ad);
  if(pct<0)return '';
  var cls=pct>=85?'match-high':pct>=65?'match-med':'match-low';
  var lbl=pct>=85?'&#127775; '+pct+'% match':pct>=65?pct+'% match':'';
  if(!lbl)return '';
  return '<span class="match-badge '+cls+'">'+lbl+'</span>';
}
window.matchScore=matchScore;
window.matchBadge=matchBadge;

// ── DROPS COUNTDOWN ──
function dropsCountdown(ad){
  if(!ad.drop)return '';
  var ends=ad.dropEnds||Date.now()+86400000;
  var diff=ends-Date.now();
  if(diff<=0)return '<span style="color:var(--t3);font-size:10px">\u23F0 Ended</span>';
  var h=Math.floor(diff/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var s=Math.floor((diff%60000)/1000);
  var pad=function(n){return n<10?'0'+n:String(n);};
  var isUrgent=diff<3600000;
  var color=isUrgent?'var(--rd)':'var(--gd)';
  return '<div style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,214,10,.1);border:1px solid rgba(255,214,10,.25);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;color:'+color+'">\u23F0 '+(h>0?h+'h ':'')+pad(m)+'m '+pad(s)+'s</div>';
}

function updateTopbarHeight(){
  var tb=document.querySelector('.topbar');
  var ticker=document.querySelector('.topbar-ticker');
  if(tb){
    var tbH=Math.round(tb.getBoundingClientRect().height);
    var tickH=ticker?Math.round(ticker.getBoundingClientRect().height):0;
    var totalH=tbH+tickH;
    document.documentElement.style.setProperty('--topbar-height',totalH+'px');
    var ptsEl=document.getElementById('pts-strip');
    if(ptsEl)ptsEl.style.top=totalH+'px';
    // pts-strip is ~30px, page starts after it
    var ptsH=ptsEl?Math.round(ptsEl.getBoundingClientRect().height):30;
    var pageTop=totalH+ptsH;
    document.documentElement.style.setProperty('--page-top',pageTop+'px');
    var pageEls=document.querySelectorAll('.page');
    for(var i=0;i<pageEls.length;i++)pageEls[i].style.top=pageTop+'px';
  }
}
