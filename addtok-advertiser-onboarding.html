<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Addtok — Advertiser Sign Up</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--c1:#12122a;--c2:#1a1a38;
  --rd:#ff2d55;--cy:#00e5ff;--pu:#bf5af2;--gd:#ffd60a;--gr:#30d158;
  --tx:#f2f2f7;--t2:rgba(242,242,247,.65);--t3:rgba(242,242,247,.38);
  --bo:rgba(255,255,255,.08);--r:14px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:var(--f);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(255,45,85,.1) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 90%,rgba(191,90,242,.08) 0%,transparent 60%);pointer-events:none}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 16px 80px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0;position:relative;z-index:1;max-width:480px;margin:0 auto}
.logo{font-size:22px;font-weight:900;letter-spacing:-1px;color:#fff}

.step-lbl{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:6px}
.step-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.step-sub{font-size:14px;color:var(--t2);margin-bottom:24px;line-height:1.5}
.step-hd{margin-bottom:20px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--bo);border-radius:var(--r);padding:12px 14px;font-size:14px;color:var(--tx);font-family:var(--f);outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--rd)}
.field select option{background:#1a1a38;color:var(--tx)}
.field textarea{resize:vertical;min-height:80px}
.btn-primary{width:100%;padding:15px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--rd),var(--pu));color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:var(--f);transition:opacity .15s,transform .1s;margin-top:4px}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-secondary{width:100%;padding:13px;border:1.5px solid var(--bo);border-radius:var(--r);background:transparent;color:var(--tx);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);margin-top:8px}
.progress-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:24px;position:relative;z-index:1;max-width:480px;margin:0 auto 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--rd),var(--pu));border-radius:2px;transition:width .4s}
/* PLAN CARDS */
.plan-card{position:relative;background:var(--c1);border:2px solid var(--bo);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.plan-card.sel{border-color:var(--rd);background:rgba(255,45,85,.06)}
.plan-card.pop{border-color:rgba(255,45,85,.4)}
.plan-name{font-size:17px;font-weight:900}
.plan-price{font-size:19px;font-weight:900}
.plan-tagline{font-size:11px;color:var(--t2);margin-top:2px}
.plan-feats{border-top:1px solid rgba(255,255,255,.06);padding-top:10px;margin-top:10px}
.plan-feat{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px}
.feat-tick{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0}
.pop-badge{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--rd),var(--pu));border-radius:20px;padding:3px 12px;font-size:10px;font-weight:800;color:#fff;white-space:nowrap}
/* AI TOOLS */
.ai-btn{background:rgba(191,90,242,.1);border:1px solid rgba(191,90,242,.25);border-radius:10px;padding:7px 12px;font-size:11px;font-weight:700;color:var(--pu);cursor:pointer;font-family:var(--f);display:flex;align-items:center;gap:5px;margin-top:8px}
.ai-spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
/* LIVE CHECK */
.vp-check{background:rgba(48,209,88,.06);border:1px solid rgba(48,209,88,.2);border-radius:12px;padding:12px;margin-top:8px;font-size:12px;line-height:1.5;display:none}
/* PLAN PREVIEW */
.pp-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.pp-row .lbl{color:var(--t2)}
.pp-row .val{font-weight:700;color:var(--tx)}
.pp-note{font-size:10px;color:var(--t3);margin-top:8px}
/* SUCCESS */
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:64px;margin-bottom:20px;display:block;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Addtok</div>
    <div style="display:flex;gap:3px;margin-top:3px">
      <span style="width:38px;height:2.5px;border-radius:2px;background:#FF2D55;display:block"></span>
      <span style="width:32px;height:2.5px;border-radius:2px;background:#00e5ff;display:block"></span>
    </div>
    <div style="font-size:8px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.3);margin-top:3px;text-transform:uppercase">add an ad.</div>
  </div>
  <div id="step-counter" style="font-size:12px;color:var(--t3);font-weight:600"></div>
</div>
<div class="progress-bar" id="progress-bar-wrap">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<div id="app"></div>

<script>
var TOTAL=6;
var step=1;
var F={
  name:'',email:'',phone:'',website:'',bio:'',
  plan:'boost',budget:'30',
  adTitle:'',adDesc:'',adUrl:'',adType:'merch',adEmoji:'\uD83D\uDCE6',
  adTag1:'',adTag2:'',adTag3:'',
  videoUrl:'',adTitleB:'',stock:null,dropHours:0,
  dropEnds:null
};

var plans=[
  {
    id:'basic',
    name:'Basic',
    tagline:'Get your ad in front of real voters',
    price:'£10/day',
    priceNote:'7-day free trial included',
    min:10,
    color:'var(--cy)',
    feats:[
      {tick:true, text:'User votes (up & down)'},
      {tick:true, text:'Ad Battle entry'},
      {tick:true, text:'Reactions — fire, funny, wow, deal'},
      {tick:true, text:'Standard feed placement'},
      {tick:true, text:'Community approval score'},
      {tick:true, text:'Basic analytics'},
      {tick:true, text:'7-day free trial'},
      {tick:false,text:'Featured slot access'},
      {tick:false,text:'Ad of the Day eligible'},
      {tick:false,text:'Collab requests'}
    ],
    pop:false,trial:true
  },
  {
    id:'boost',
    name:'Boost',
    tagline:'More reach, more features, more results',
    price:'£30/day',
    priceNote:'Most popular',
    min:30,
    color:'var(--rd)',
    feats:[
      {tick:true, text:'Everything in Basic'},
      {tick:true, text:'Featured slot access'},
      {tick:true, text:'Ad of the Day eligible'},
      {tick:true, text:'Full analytics dashboard'},
      {tick:true, text:'Early drop scheduling'},
      {tick:true, text:'Collab requests from influencers'},
      {tick:true, text:'Match score targeting'},
      {tick:true, text:'Reaction breakdown analytics'},
      {tick:false,text:'Top feed placement'},
      {tick:false,text:'Weekly featured guarantee'}
    ],
    pop:true,trial:false
  },
  {
    id:'elite',
    name:'Elite',
    tagline:'Maximum visibility across the whole platform',
    price:'£100/day',
    priceNote:'Best for serious brands',
    min:100,
    color:'var(--gd)',
    feats:[
      {tick:true, text:'Everything in Boost'},
      {tick:true, text:'Top feed placement always'},
      {tick:true, text:'Weekly featured slot guarantee'},
      {tick:true, text:'AI-powered audience insights'},
      {tick:true, text:'Leaderboard boost — stay visible longer'},
      {tick:true, text:'Ad Battle priority seeding'},
      {tick:true, text:'Spin the Ad category pinning'},
      {tick:true, text:'Custom deal code creation'},
      {tick:true, text:'Priority email support'},
      {tick:true, text:'Early access to new features'}
    ],
    pop:false,trial:false
  }
];

function sf(k,v){F[k]=v;}
window.sf=sf;

function render(){
  var el=document.getElementById('app');
  var fns=[null,p1,p2,p3,p4,p5,pSuccess];
  if(el&&fns[step])el.innerHTML=fns[step]();
  var pct=Math.round(((step-1)/TOTAL)*100);
  var pf=document.getElementById('progress-fill');
  if(pf)pf.style.width=pct+'%';
  var sc=document.getElementById('step-counter');
  if(sc)sc.textContent=step<7?'Step '+step+' of '+TOTAL:'';
  var pb=document.getElementById('progress-bar-wrap');
  if(pb)pb.style.display=step===7?'none':'block';
  scrollTo(0,0);
}

function next(){
  if(!validate())return;
  step++;
  render();
}
window.next=next;

function back(){step=Math.max(1,step-1);render();}
window.back=back;

function validate(){
  if(step===1){
    if(!F.name.trim()){alert('Please enter your name');return false;}
    if(!F.email.match(/^[^@]+@[^@]+\.[^@]+$/)){alert('Please enter a valid email');return false;}
    return true;
  }
  if(step===4){
    if(!F.adTitle.trim()){alert('Please enter an ad title');return false;}
    if(!F.adDesc.trim()){alert('Please enter an ad description');return false;}
    if(!F.adUrl.trim()){alert('Please enter a destination URL');return false;}
    return true;
  }
  return true;
}

// ── STEP 1: Account ──
function p1(){
  return '<div class="wrap">'+
    '<div class="step-hd"><div class="step-lbl">Step 1 of '+TOTAL+'</div>'+
    '<div class="step-title">Create your account</div>'+
    '<div class="step-sub">Join thousands of brands reaching real engaged users.</div></div>'+
    '<div class="field"><label>Full name or brand name</label>'+
    '<input type="text" placeholder="e.g. KicksWorld" value="'+F.name+'" oninput="sf(\'name\',this.value)"></div>'+
    '<div class="field"><label>Email address</label>'+
    '<input type="email" placeholder="hello@yourbrand.com" value="'+F.email+'" oninput="sf(\'email\',this.value)"></div>'+
    '<div class="field"><label>Phone number <span style="color:var(--t3);font-weight:400">(optional)</span></label>'+
    '<input type="tel" placeholder="+44 7700 000000" value="'+F.phone+'" oninput="sf(\'phone\',this.value)"></div>'+
    '<div class="field"><label>Website</label>'+
    '<input type="url" placeholder="https://yourbrand.com" value="'+F.website+'" oninput="sf(\'website\',this.value)"></div>'+
    '<button class="btn-primary" onclick="next()">Continue &#8594;</button>'+
  '</div>';
}

// ── STEP 2: Brand ──
function p2(){
  var types=[
    {v:'merch',l:'&#x1F6CD; Merch / Product'},
    {v:'sponsor',l:'&#x1F4B0; Sponsored Brand'},
    {v:'influencer',l:'&#x1F451; Influencer / Creator'},
    {v:'brand',l:'&#x2B50; Brand Campaign'},
    {v:'app',l:'&#x1F4F1; App / Software'},
  ];
  var typeOpts=types.map(function(t){return '<option value="'+t.v+'"'+(F.adType===t.v?' selected':'')+'>'+t.l+'</option>';}).join('');
  return '<div class="wrap">'+
    '<div class="step-hd"><div class="step-lbl">Step 2 of '+TOTAL+'</div>'+
    '<div class="step-title">Tell us about your brand</div>'+
    '<div class="step-sub">Help us match your ads to the right audience.</div></div>'+
    '<div class="field"><label>What are you advertising?</label>'+
    '<select onchange="sf(\'adType\',this.value)">'+typeOpts+'</select></div>'+
    '<div class="field"><label>Brand bio <span style="color:var(--t3);font-weight:400">(shown on your ads)</span></label>'+
    '<textarea placeholder="e.g. Premium street footwear for the culture." oninput="sf(\'bio\',this.value)">'+F.bio+'</textarea></div>'+
    '<button class="btn-primary" onclick="next()">Continue &#8594;</button>'+
    '<button class="btn-secondary" onclick="back()">&#8592; Back</button>'+
  '</div>';
}

// ── STEP 3: Plan ──
function p3(){
  return '<div class="wrap">'+
    '<div class="step-hd"><div class="step-lbl">Step 3 of '+TOTAL+'</div>'+
    '<div class="step-title">Choose your plan</div>'+
    '<div class="step-sub">Pay per click only. No monthly fees. Cancel anytime.</div></div>'+
    planCardsHtml()+
    '<div style="font-size:11px;color:var(--t3);text-align:center;margin-bottom:16px">All plans include votes, ad battles and reactions. Estimates only.</div>'+
    '<button class="btn-primary" onclick="next()">Continue &#8594;</button>'+
    '<button class="btn-secondary" onclick="back()">&#8592; Back</button>'+
  '</div>';
}

function planCardsHtml(){
  var html='';
  for(var pi=0;pi<plans.length;pi++){
    var pl=plans[pi];
    var isSel=F.plan===pl.id;
    var featsHtml='';
    for(var fi=0;fi<pl.feats.length;fi++){
      var ft=pl.feats[fi];
      featsHtml+='<div class="plan-feat" style="color:'+(ft.tick?'var(--tx)':'rgba(242,242,247,.3)')+'">'+
        '<span class="feat-tick" style="background:'+(ft.tick?pl.color:'rgba(255,255,255,.08)')+';color:'+(ft.tick?'#fff':'rgba(255,255,255,.3)')+'">'+
          (ft.tick?'&#10003;':'&#10007;')+
        '</span>'+ft.text+'</div>';
    }
    var popBadge=pl.pop?'<div class="pop-badge">&#x1F525; Most Popular</div>':'';
    var trialBadge=pl.trial?'<div style="background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.25);border-radius:8px;padding:3px 8px;font-size:10px;font-weight:800;color:var(--cy);margin-bottom:8px;display:inline-block">&#127381; 7-day free trial</div><br>':'';
    html+='<div class="plan-card'+(isSel?' sel':'')+(pl.pop?' pop':'')+'" id="pl-'+pl.id+'" data-pid="'+pl.id+'" onclick="selPlan(this.dataset.pid)">'+
      popBadge+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">'+
        '<div>'+
          '<div class="plan-name" style="color:'+(isSel?pl.color:'var(--tx)')+'">'+pl.name+'</div>'+
          '<div class="plan-tagline">'+pl.tagline+'</div>'+
        '</div>'+
        '<div style="text-align:right;flex-shrink:0;margin-left:12px">'+
          '<div class="plan-price" style="color:'+pl.color+'">'+pl.price+'</div>'+
          '<div style="font-size:10px;color:var(--t3)">'+pl.priceNote+'</div>'+
        '</div>'+
      '</div>'+
      trialBadge+
      '<div class="plan-feats">'+featsHtml+'</div>'+
      (isSel?'<div style="position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:'+pl.color+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff">&#10003;</div>':'')+
    '</div>';
  }
  return html;
}
window.planCardsHtml=planCardsHtml;

function selPlan(p){
  F.plan=p;
  var planMins={basic:10,boost:30,elite:100};
  var minB=planMins[p]||10;
  if(!F.budget||parseInt(F.budget)<minB)F.budget=String(minB);
  render();
}
window.selPlan=selPlan;

// ── STEP 4: Create Ad ──
function p4(){
  var adTypes=[
    {v:'merch',l:'&#x1F6CD; Merch Drop'},
    {v:'sponsor',l:'&#x1F4B0; Sponsored'},
    {v:'influencer',l:'&#x1F451; Influencer'},
    {v:'brand',l:'&#x2B50; Brand'},
  ];
  var typeOpts=adTypes.map(function(t){return '<option value="'+t.v+'"'+(F.adType===t.v?' selected':'')+'>'+t.l+'</option>';}).join('');
  return '<div class="wrap">'+
    '<div class="step-hd"><div class="step-lbl">Step 4 of '+TOTAL+'</div>'+
    '<div class="step-title">Create your ad</div>'+
    '<div class="step-sub">This is what users see in their feed.</div></div>'+
    '<div class="field"><label>Ad title</label>'+
    '<input type="text" id="fi-title" placeholder="e.g. Air Phantom X — Limited Drop" value="'+F.adTitle+'" oninput="sf(\'adTitle\',this.value);vpCheck()"></div>'+
    '<div class="field"><label>Ad description</label>'+
    '<textarea id="fi-desc" placeholder="What makes your product unique? Keep it punchy." oninput="sf(\'adDesc\',this.value)">'+F.adDesc+'</textarea>'+
    '<button class="ai-btn" onclick="aiGenerateDesc()">&#x1F916; AI write description</button></div>'+
    '<div class="field"><label>Destination URL</label>'+
    '<input type="url" id="fi-url" placeholder="https://yourproduct.com/page" value="'+F.adUrl+'" oninput="sf(\'adUrl\',this.value)"></div>'+
    '<div class="field"><label>Ad type</label>'+
    '<select onchange="sf(\'adType\',this.value)">'+typeOpts+'</select></div>'+
    '<div class="field" style="background:rgba(99,91,255,.04);border:1px solid rgba(99,91,255,.12);border-radius:var(--r);padding:12px">'+'<label style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'+'<span style="background:rgba(99,91,255,.15);border:1px solid rgba(99,91,255,.3);border-radius:5px;padding:2px 7px;font-size:9px;font-weight:800;color:#a78bfa">&#x1F9EA; A/B TEST</span>'+'Alternate title <span style="color:var(--t3);font-weight:400;font-size:11px">(optional — we\'ll test both with real users)</span>'+'</label>'+'<input type="text" id="fi-abtitle" placeholder="e.g. Try a different headline here" oninput="sf(\'abTitle\',this.value)">'+'</div>'+'<div class="field"><label>Video URL <span style="color:var(--t3);font-weight:400">(optional — YouTube, TikTok, Vimeo)</span></label>'+
    '<input type="url" id="fi-video" placeholder="https://youtube.com/watch?v=..." value="'+(F.videoUrl||'')+'" oninput="sf(\'videoUrl\',this.value)"></div>'+
    '<div class="field" style="background:rgba(255,214,10,.04);border:1px solid rgba(255,214,10,.12);border-radius:var(--r);padding:12px">'+
    '<label style="display:flex;align-items:center;gap:6px">'+
    '<span style="background:rgba(255,214,10,.15);border:1px solid rgba(255,214,10,.3);border-radius:5px;padding:2px 7px;font-size:9px;font-weight:800;color:var(--gd)">&#x1F4E6; STOCK</span>'+
    'Inventory <span style="color:var(--t3);font-weight:400;font-size:11px">(optional)</span></label>'+
    '<input type="number" id="fi-stock" min="0" placeholder="e.g. 500 — leave blank for unlimited" oninput="sf(\'stock\',parseInt(this.value)||null)" style="margin-top:6px"></div>'+
    '<div class="field" style="background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.12);border-radius:var(--r);padding:12px">'+
    '<label style="display:flex;align-items:center;gap:6px">'+
    '<span style="background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.3);border-radius:5px;padding:2px 7px;font-size:9px;font-weight:800;color:var(--cy)">&#x1F4A7; DROP</span>'+
    'Limited Drop <span style="color:var(--t3);font-weight:400;font-size:11px">(optional)</span></label>'+
    '<div class="field" style="background:rgba(255,159,10,.04);border:1px solid rgba(255,159,10,.12);border-radius:var(--r);padding:12px;margin-bottom:10px">'+'<label style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'+'<span style="background:rgba(255,159,10,.15);border:1px solid rgba(255,159,10,.3);border-radius:5px;padding:2px 7px;font-size:9px;font-weight:800;color:#ff9f0a">&#x23F0; SCHEDULE</span>'+'Ad hours <span style="color:var(--t3);font-weight:400;font-size:11px">(optional — show only at these times)</span>'+'</label>'+'<div style="display:flex;gap:8px;align-items:center">'+'<input type="time" id="fi-sched-start" oninput="sf(\'scheduleStart\',this.value)" style="flex:1;background:rgba(255,255,255,.05);border:1.5px solid var(--bo);border-radius:10px;padding:10px;color:var(--tx);font-family:var(--f)">'+'<span style="color:var(--t3)">to</span>'+'<input type="time" id="fi-sched-end" oninput="sf(\'scheduleEnd\',this.value)" style="flex:1;background:rgba(255,255,255,.05);border:1.5px solid var(--bo);border-radius:10px;padding:10px;color:var(--tx);font-family:var(--f)">'+'</div>'+'</div>'+'<select id="fi-drop" onchange="sf(\'dropHours\',parseInt(this.value)||0)" style="margin-top:6px">'+
    '<option value="0">No — standard ad</option>'+
    '<option value="24">24-hour drop</option>'+
    '<option value="12">12-hour drop</option>'+
    '<option value="6">6-hour flash drop</option>'+
    '</select></div>'+
    '<div id="vp-check-box" class="vp-check"></div>'+
    '<div style="background:rgba(99,91,255,.06);border:1px solid rgba(99,91,255,.2);border-radius:var(--r);padding:12px;margin-bottom:10px">'+
    '<label style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'+
      '<span style="background:rgba(99,91,255,.2);border:1px solid rgba(99,91,255,.4);border-radius:5px;padding:2px 7px;font-size:9px;font-weight:800;color:#a78bfa">&#x1F9EA; A/B TEST</span>'+
      '<span style="font-size:13px;font-weight:700">Test a second title</span>'+
      '<span style="font-size:11px;color:var(--t3);font-weight:400">optional</span>'+
    '</label>'+
    '<input type="text" id="fi-title-b" placeholder="Alternative title — we\'ll split traffic and show you the winner" oninput="sf(\'adTitleB\',this.value)" style="margin-top:0">'+
    '<div style="font-size:10px;color:rgba(99,91,255,.7);margin-top:4px">50% of users will see each title. Winner shown after 100 votes.</div>'+
  '</div>'+
  '<button class="btn-primary" onclick="aiContentCheck()">&#x1F916; AI content check &#8594;</button>'+
    '<button class="btn-secondary" onclick="back()">&#8592; Back</button>'+
  '</div>';
}

// ── STEP 5: Budget ──
function p5(){
  var planMins={basic:10,boost:30,elite:100};
  var minB=planMins[F.plan]||10;
  var budgetVal=parseInt(F.budget)||minB;
  return '<div class="wrap">'+
    '<div class="step-hd"><div class="step-lbl">Step 5 of '+TOTAL+'</div>'+
    '<div class="step-title">Set your daily budget</div>'+
    '<div class="step-sub">You only pay when users click your link.</div></div>'+
    '<div style="background:rgba(255,45,85,.06);border:1px solid rgba(255,45,85,.2);border-radius:14px;padding:12px 14px;margin-bottom:16px;font-size:12px">'+
    '<b>'+F.plan.charAt(0).toUpperCase()+F.plan.slice(1)+' plan</b> selected &middot; Minimum £'+minB+'/day'+
    (F.plan==='basic'?' &middot; <span style="color:var(--cy)">&#127381; 7-day free trial</span>':'')+
    '</div>'+
    '<div class="field"><label>Daily spend cap</label>'+
    '<div style="display:flex;align-items:center;gap:8px">'+
    '<span style="font-size:18px;font-weight:800;color:var(--t2);background:rgba(255,255,255,.05);border:1.5px solid var(--bo);border-radius:var(--r);padding:10px 12px">&#163;</span>'+
    '<input id="fi-budget" type="number" min="'+minB+'" placeholder="'+minB+'" value="'+budgetVal+'" oninput="sf(\'budget\',this.value);updPP()" style="flex:1">'+
    '</div>'+
    '<div style="font-size:11px;color:var(--t3);margin-top:4px">Minimum £'+minB+'/day on your plan</div></div>'+
    '<button class="ai-btn" onclick="aiRecommendBudget()">&#x1F916; AI recommend budget for me</button>'+
    '<div id="pp-preview" style="background:var(--c1);border:1px solid var(--bo);border-radius:14px;padding:14px;margin-top:16px"></div>'+
    '<button class="btn-primary" onclick="next()" style="margin-top:16px">Review &amp; Submit &#8594;</button>'+
    '<button class="btn-secondary" onclick="back()">&#8592; Back</button>'+
  '</div>';
}

// ── STEP 6: Success ──
function pSuccess(){
  return '<div class="wrap"><div class="success-screen">'+
    '<span class="success-icon">&#x1F389;</span>'+
    '<div style="font-size:24px;font-weight:900;margin-bottom:8px">You\'re all set!</div>'+
    '<div style="font-size:14px;color:var(--t2);margin-bottom:24px;line-height:1.6">Your ad has been submitted for review. We\'ll email you within 24 hours once it\'s live.</div>'+
    '<div style="background:var(--c1);border:1px solid var(--bo);border-radius:14px;padding:14px;text-align:left;margin-bottom:20px">'+
    '<div style="font-size:11px;font-weight:800;color:var(--t3);letter-spacing:1px;margin-bottom:8px">YOUR SUBMISSION</div>'+
    '<div style="font-size:13px;font-weight:800">'+F.adTitle+'</div>'+
    '<div style="font-size:12px;color:var(--t2);margin-top:2px">'+F.name+' &middot; '+F.plan.charAt(0).toUpperCase()+F.plan.slice(1)+' plan &middot; £'+F.budget+'/day</div>'+
    '</div>'+
    '<button class="btn-primary" onclick="goToDashboard()">Go to Dashboard &#8594;</button>'+
  '</div></div>';
}

// ── AI TOOLS ──
function aiGenerateDesc(){
  var title=F.adTitle||'your product';
  var type=F.adType||'brand';
  var btn=document.querySelector('.ai-btn');
  if(btn){btn.innerHTML='<span class="ai-spin">&#x2699;</span> Writing...';}
  setTimeout(function(){
    var descs={
      merch:'Exclusively designed for those who set the trends. Limited run — once they\'re gone, they\'re gone. Grab yours before the drop ends.',
      sponsor:'Level up your setup with the gear that pros actually use. Join thousands who\'ve already made the switch.',
      influencer:'This one\'s been on my radar for months — finally partnered up to share it with you. My honest review: worth every penny.',
      brand:'Built different. Designed for those who don\'t follow trends, they start them.',
      app:'The app your phone\'s been missing. Thousands of users can\'t be wrong — see what the hype is about.',
    };
    var d=descs[type]||descs.brand;
    var el=document.getElementById('fi-desc');
    if(el){el.value=d;sf('adDesc',d);}
    if(btn){btn.innerHTML='&#x1F916; AI write description';}
  },1200);
}
window.aiGenerateDesc=aiGenerateDesc;

function vpCheck(){
  var el=document.getElementById('vp-check-box');
  if(!el)return;
  var title=F.adTitle||'';
  if(title.length<5){el.style.display='none';return;}
  el.style.display='block';
  var score=Math.min(100,60+title.length*2+(title.indexOf('!')||0?5:0));
  score=Math.max(50,Math.min(98,score));
  el.innerHTML='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
    '<span style="font-size:14px">&#x1F916;</span>'+
    '<span style="font-size:12px;font-weight:800;color:var(--gr)">AI Content Check</span>'+
    '<span style="font-size:11px;font-weight:800;background:rgba(48,209,88,.15);border-radius:20px;padding:2px 8px;color:var(--gr)">'+score+'% score</span>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--t2)">Title looks good. '+(score>80?'Strong hook — this will perform well in the feed.':'Consider adding more detail or an offer to boost performance.')+'</div>';
}
window.vpCheck=vpCheck;

function aiContentCheck(){
  var btn=document.querySelector('.btn-primary');
  if(btn)btn.innerHTML='<span class="ai-spin">&#x2699;</span> Checking content...';
  setTimeout(function(){
    if(!validate()){if(btn)btn.innerHTML='&#x1F916; AI content check &#8594;';return;}
    next();
  },1500);
}
window.aiContentCheck=aiContentCheck;

function updPP(){
  var planMins={basic:10,boost:30,elite:100};
  var minB=planMins[F.plan]||10;
  var b=Math.max(minB,parseInt(F.budget)||minB);
  var cpc=F.plan==='elite'?0.25:F.plan==='boost'?0.40:0.60;
  var el=document.getElementById('pp-preview');
  if(el){
    el.innerHTML=
      '<div class="pp-row"><span class="lbl">Daily spend cap</span><span class="val">£'+b+'/day</span></div>'+
      '<div class="pp-row"><span class="lbl">Est. clicks/day</span><span class="val">~'+Math.floor(b/cpc)+' clicks</span></div>'+
      '<div class="pp-row"><span class="lbl">Cost per click</span><span class="val">est. £'+cpc.toFixed(2)+'</span></div>'+
      '<div class="pp-row"><span class="lbl">Est. monthly spend</span><span class="val">~£'+(b*30)+'/month</span></div>'+
      '<div class="pp-note">Estimates only. You only pay when users click.</div>';
  }
}
window.updPP=updPP;

function aiRecommendBudget(){
  var planMins={basic:10,boost:30,elite:100};
  var minB=planMins[F.plan]||10;
  var rec=F.plan==='elite'?150:F.plan==='boost'?50:20;
  var el=document.getElementById('fi-budget');
  if(el){el.value=rec;}
  sf('budget',String(rec));
  F.budget=String(rec);
  updPP();
  alert('Recommended £'+rec+'/day for your '+F.plan+' plan. This should deliver great results from day one.');
}
window.aiRecommendBudget=aiRecommendBudget;

function goToDashboard(){
  var qs='name='+encodeURIComponent(F.name||'')+
    '&email='+encodeURIComponent(F.email||'')+
    '&plan='+encodeURIComponent(F.plan||'boost')+
    '&budget='+encodeURIComponent(F.budget||'30')+
    '&new=1';
  window.location.href='addtok-advertiser-dashboard.html?'+qs;
}
window.goToDashboard=goToDashboard;

function submit(){
  step=6;render();
}
window.submit=submit;

// Init
render();
setTimeout(updPP,100);
</script>
</body>
</html>
