<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Addtok — Advertiser Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--c1:#12122a;--card:#12122a;--c2:#1a1a38;
  --rd:#ff2d55;--cy:#00e5ff;--pu:#bf5af2;--gd:#ffd60a;--gr:#30d158;
  --tx:#f2f2f7;--t2:rgba(242,242,247,.65);--t3:rgba(242,242,247,.38);
  --bo:rgba(255,255,255,.08);--border:rgba(255,255,255,.08);
  --r:12px;--r2:14px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:var(--f)}
.topbar{position:fixed;top:0;left:0;right:0;background:rgba(13,13,26,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.logo{font-size:20px;font-weight:900;letter-spacing:-1px;color:#fff}
.logo-bars{display:flex;gap:3px;margin-top:2px}
.bar-r{width:38px;height:2.5px;border-radius:2px;background:#FF2D55;display:block}
.bar-c{width:32px;height:2.5px;border-radius:2px;background:#00e5ff;display:block}
.main{margin-top:60px;padding:0 0 80px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,26,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;z-index:100}
.nav::-webkit-scrollbar{display:none}
.ni{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 14px;cursor:pointer;border:none;background:none;color:var(--t3);font-family:var(--f);min-width:60px}
.ni.on{color:var(--rd)}
.ni-icon{font-size:18px}
.ni-lbl{font-size:9px;font-weight:700;letter-spacing:.3px}
.page{padding:16px;display:none}
.page.active{display:block}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:18px;font-weight:900;letter-spacing:-.3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:900;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-live{background:rgba(48,209,88,.15);border:1px solid rgba(48,209,88,.3);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--gr)}
.badge-pending{background:rgba(255,214,10,.15);border:1px solid rgba(255,214,10,.3);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--gd)}
.badge-paused{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--t3)}
.btn{padding:10px 16px;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f)}
.btn-primary{background:linear-gradient(135deg,var(--rd),var(--pu));color:#fff}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-secondary{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2)}
.fi{margin-bottom:10px}
.fi label{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px}
.fi input,.fi textarea,.fi select{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 13px;font-size:14px;color:var(--tx);font-family:var(--f);outline:none;transition:border-color .2s}
.fi input:focus,.fi textarea:focus,.fi select:focus{border-color:var(--rd)}
.fi select option{background:#1a1a38}
.fi textarea{resize:vertical;min-height:70px}
.pp-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.pp-row .lbl{color:var(--t2)}
.pp-row .val{font-weight:700}
.chart-bar{background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;height:120px;display:flex;align-items:flex-end;gap:4px;padding:8px}
.chart-col{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--rd),var(--pu));min-height:4px;transition:height .3s}
.toast-area{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;width:calc(100% - 32px);max-width:340px}
.toast{background:#1e1e3a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;margin-top:6px;color:var(--tx);animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo">Addtok</div>
    <div class="logo-bars"><span class="bar-r"></span><span class="bar-c"></span></div>
    <div style="font-size:8px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.3);margin-top:3px;text-transform:uppercase">add an ad.</div>
  </div>
  <div style="font-size:11px;color:var(--t3);font-weight:600">Advertiser Dashboard</div>
</div>

<div class="main">
  <div id="p-overview" class="page"></div>
  <div id="p-ads" class="page"></div>
  <div id="p-analytics" class="page"></div>
  <div id="p-create" class="page"></div>
  <div id="p-alerts" class="page"></div>
  <div id="p-schedule" class="page"></div>
  <div id="p-abtest" class="page"></div>
  <div id="p-conversions" class="page"></div>
  <div id="p-billing" class="page"></div>
  <div id="p-settings" class="page"></div>
</div>

<nav class="nav">
  <button class="ni on" id="ni-overview" onclick="go('overview')"><div class="ni-icon">&#x1F4CA;</div><div class="ni-lbl">Overview</div></button>
  <button class="ni" id="ni-ads" onclick="go('ads')"><div class="ni-icon">&#x1F4E2;</div><div class="ni-lbl">My Ads</div></button>
  <button class="ni" id="ni-analytics" onclick="go('analytics')"><div class="ni-icon">&#x1F4C8;</div><div class="ni-lbl">Analytics</div></button>
  <button class="ni" id="ni-create" onclick="go('create')"><div class="ni-icon">&#x2795;</div><div class="ni-lbl">New Ad</div></button>
  <button class="ni" id="ni-alerts" onclick="go('alerts')"><div class="ni-icon">&#x1F514;</div><div class="ni-lbl">Alerts</div></button>
  <button class="ni" id="ni-schedule" onclick="go('schedule')"><div class="ni-icon">&#x1F4C5;</div><div class="ni-lbl">Schedule</div></button>
  <button class="ni" id="ni-billing" onclick="go('billing')"><div class="ni-icon">&#x1F4C3;</div><div class="ni-lbl">Billing</div></button>
</nav>

<div class="toast-area" id="toast-area"></div>

<script>
var D={
  brand:'KicksWorld',
  plan:'boost',
  budget:30,
  ads:[
    {id:1,em:'\uD83D\uDC5F',title:'Air Phantom X \u2014 Limited Drop',status:'live',clicks:3210,views:84200,spend:48.60,stock:500,stockLeft:350,drop:1,videoUrl:'https://youtube.com/watch?v=dQw4w9WgXcQ',approval:96,votes:2840,rxn:{fire:247,funny:12,wow:89,deal:156}},
    {id:2,scheduleStart:'18:00',scheduleEnd:'22:00',em:'\uD83C\uDFAE',title:'NovaBit Gaming Chair Pro',status:'live',clicks:1840,views:52100,spend:31.20,stock:null,stockLeft:null,drop:0,videoUrl:'',approval:87,votes:1200,rxn:{fire:120,funny:45,wow:67,deal:210}},
    {id:3,em:'\uD83D\uDC84',title:'GlowLab Rose Glow Serum',status:'pending',clicks:0,views:0,spend:0,stock:200,stockLeft:140,drop:0,videoUrl:'',approval:0,votes:0,rxn:{fire:0,funny:0,wow:0,deal:0}},
    {id:4,em:'\uD83E\uDDE2',title:'UrbanForge Caps Season 4',status:'paused',clicks:890,views:28400,spend:18.90,stock:150,stockLeft:105,drop:1,videoUrl:'',approval:78,votes:650,rxn:{fire:80,funny:20,wow:30,deal:90}}
  ],
  notifs:[
    {type:'good',read:false,title:'Air Phantom X trending!',body:'Your ad reached 2,840 votes and 96% approval. Highest performing ad this week.',time:'2h ago'},
    {type:'ai',read:false,title:'AI Recommendation',body:'Boost your budget by 20% today \u2014 high traffic period detected.',time:'4h ago'},
    {type:'good',read:true,title:'Ad approved',body:'GlowLab Rose Glow Serum has been approved and will go live shortly.',time:'1d ago'},
  ],
  schedule:{days:[0,1,2,3,4],hours:[0,1,2,3]},
  abTests:[
    {id:1,adId:1,variantA:'Air Phantom X \u2014 Limited Drop',variantB:'Air Phantom X \u2014 Only 350 Pairs Left!',clicksA:1240,clicksB:1970,votesA:1200,votesB:1640,complete:false}
  ]
};

function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n);}

function toast(msg,type){
  var area=document.getElementById('toast-area');
  if(!area)return;
  var colors={suc:'rgba(48,209,88,.15)',w:'rgba(255,214,10,.15)',i:'rgba(0,229,255,.1)'};
  var div=document.createElement('div');
  div.className='toast';
  div.style.borderColor=type==='suc'?'rgba(48,209,88,.3)':type==='w'?'rgba(255,214,10,.3)':'rgba(0,229,255,.2)';
  div.style.background=colors[type]||colors.i;
  div.textContent=msg;
  area.appendChild(div);
  setTimeout(function(){div.remove();},3000);
}
window.toast=toast;

function go(page){
  var pages=document.querySelectorAll('.page');
  for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
  var btns=document.querySelectorAll('.ni');
  for(var j=0;j<btns.length;j++)btns[j].classList.remove('on');
  var el=document.getElementById('p-'+page);
  if(el){el.classList.add('active');el.innerHTML=renderPage(page);}
  var btn=document.getElementById('ni-'+page);
  if(btn)btn.classList.add('on');
}
window.go=go;

function renderPage(p){
  var map={
    overview:rOverview,ads:rAds,analytics:rAnalytics,
    create:rCreate,alerts:rAlerts,schedule:rSchedule,
    abtest:rABTest,conversions:rConversions,billing:rBilling,settings:rSettings
  ,campaign:rCampaign,scheduling:rScheduling,conversions:rConversions};
  return map[p]?map[p]():'<div style="padding:20px;color:var(--t3)">Loading...</div>';
}

// ── OVERVIEW ──
function rOverview(){
  var totalClicks=D.ads.reduce(function(s,a){return s+a.clicks;},0);
  var totalViews=D.ads.reduce(function(s,a){return s+a.views;},0);
  var totalSpend=D.ads.reduce(function(s,a){return s+a.spend;},0);
  var liveAds=D.ads.filter(function(a){return a.status==='live';}).length;
  var avgAppr=Math.round(D.ads.filter(function(a){return a.approval>0;}).reduce(function(s,a){return s+a.approval;},0)/Math.max(1,D.ads.filter(function(a){return a.approval>0;}).length));
  return '<div style="padding:16px">'+
    '<div style="margin-bottom:16px"><div style="font-size:11px;color:var(--t3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Welcome back</div>'+
    '<div style="font-size:22px;font-weight:900;letter-spacing:-.5px">'+D.brand+'</div>'+
    '<div style="font-size:12px;color:var(--t3);margin-top:2px">&#x1F4C5; '+D.plan.charAt(0).toUpperCase()+D.plan.slice(1)+' Plan &middot; £'+D.budget+'/day budget</div></div>'+
    '<div class="stat-grid">'+
      '<div class="stat"><div class="stat-val" style="color:var(--rd)">'+fmt(totalClicks)+'</div><div class="stat-lbl">Total Clicks</div></div>'+
      '<div class="stat"><div class="stat-val" style="color:var(--cy)">'+fmt(totalViews)+'</div><div class="stat-lbl">Total Views</div></div>'+
      '<div class="stat"><div class="stat-val" style="color:var(--gd)">£'+totalSpend.toFixed(2)+'</div><div class="stat-lbl">Total Spend</div></div>'+
      '<div class="stat"><div class="stat-val" style="color:var(--gr)">'+avgAppr+'%</div><div class="stat-lbl">Avg Approval</div></div>'+
    '</div>'+
    '<div class="card">'+
      '<div style="font-size:13px;font-weight:800;margin-bottom:10px">&#x1F4E2; Active Ads ('+liveAds+')</div>'+
      D.ads.filter(function(a){return a.status==='live';}).map(function(ad){
        return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)">'+
          '<div style="font-size:24px">'+ad.em+'</div>'+
          '<div style="flex:1"><div style="font-size:12px;font-weight:700">'+ad.title+'</div>'+
          '<div style="font-size:10px;color:var(--t3)">'+fmt(ad.clicks)+' clicks &middot; '+fmt(ad.votes)+' votes &middot; '+ad.approval+'% approval</div></div>'+
          '<div class="badge-live">live</div>'+
        '</div>';
      }).join('')+
    '</div>'+
    '<div class="card">'+
      '<div style="font-size:13px;font-weight:800;margin-bottom:10px">&#x26A1; Quick Actions</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<button onclick="go(\'create\')" class="btn btn-primary" style="font-size:12px">&#x2795; New Ad</button>'+
        '<button onclick="go(\'analytics\')" class="btn btn-secondary" style="font-size:12px">&#x1F4C8; Analytics</button>'+
        '<button onclick="go(\'schedule\')" class="btn btn-secondary" style="font-size:12px">&#x1F4C5; Schedule</button>'+
        '<button onclick="go(\'abtest\')" class="btn btn-secondary" style="font-size:12px">&#x1F9EA; A/B Test</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// ── MY ADS ──

function newCampaign(){alert("Campaign builder coming soon!");}
window.newCampaign=newCampaign;
function rCampaigns(){
  var camps=[
    {id:1,name:'Summer Drops 2025',ads:['Air Phantom X','UrbanForge Caps'],budget:500,spent:287,status:'active',startDate:'2025-06-01',endDate:'2025-08-31'},
    {id:2,name:'Fitness Push',ads:['MassiveGains Protein'],budget:200,spent:89,status:'active',startDate:'2025-06-01',endDate:'2025-06-30'},
  ];
  var html='<div class="sec-hd"><div><div class="sec-title">Campaigns</div></div>'+
    '<button class="btn btn-sm btn-primary" onclick="newCampaign()">+ New Campaign</button></div>';
  for(var ci=0;ci<camps.length;ci++){
    var c=camps[ci];
    var pct=Math.round(c.spent/c.budget*100);
    html+='<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
        '<div><div style="font-size:14px;font-weight:800">'+c.name+'</div>'+
        '<div style="font-size:11px;color:var(--t3)">'+c.ads.join(' &middot; ')+'</div></div>'+
        '<span class="badge-'+c.status+'">'+c.status+'</span>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">'+
        '<span style="color:var(--t3)">Budget used</span>'+
        '<span style="font-weight:700">£'+c.spent+' / £'+c.budget+' ('+pct+'%)</span>'+
      '</div>'+
      '<div style="height:6px;background:rgba(255,255,255,.08);border-radius:3px">'+
        '<div style="width:'+pct+'%;height:100%;background:'+(pct>80?'var(--red)':pct>50?'var(--gd)':'var(--gr)')+';border-radius:3px"></div>'+
      '</div>'+
      '<div style="font-size:10px;color:var(--t3);margin-top:6px">'+c.startDate+' → '+c.endDate+'</div>'+
    '</div>';
  }
  return html;
}
window.rCampaigns=rCampaigns;
function rAds(){
  var adRows=D.ads.map(function(ad){
    var stockBar='';
    if(ad.stock){
      var pct=Math.round((ad.stockLeft/ad.stock)*100);
      var col=pct<=20?'var(--rd)':pct<=40?'var(--gd)':'var(--gr)';
      stockBar='<div style="margin-top:4px"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:2px"><span>Stock</span><span>'+ad.stockLeft+'/'+ad.stock+'</span></div>'+
        '<div style="height:3px;background:rgba(255,255,255,.08);border-radius:2px"><div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:2px"></div></div></div>';
    }
    var badges='<span class="badge-'+ad.status+'">'+ad.status+'</span>';
    if(ad.videoUrl)badges+=' <span style="background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.25);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:800;color:var(--rd)">&#x1F4F9;</span>';
    if(ad.drop)badges+=' <span style="background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.25);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:800;color:var(--cy)">&#x1F4A7; DROP</span>';
    if(ad.approval>0&&ad.votes>=10&&ad.approval<30)badges+=' <span style="background:rgba(255,45,85,.15);border:1px solid rgba(255,45,85,.3);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:800;color:var(--rd)">&#x26A0; FLAGGED</span>';
    return '<div class="card">'+
      '<div style="display:flex;align-items:flex-start;gap:10px">'+
        '<div style="font-size:28px;flex-shrink:0">'+ad.em+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:13px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+ad.title+'</div>'+
          '<div style="margin-bottom:4px">'+badges+'</div>'+
          '<div style="display:flex;gap:10px;font-size:11px;color:var(--t3)">'+
            '<span>&#x1F517; '+fmt(ad.clicks)+' clicks</span>'+
            '<span>&#x1F440; '+fmt(ad.views)+' views</span>'+
            '<span>&#x1F44D; '+ad.approval+'%</span>'+
          '</div>'+
          stockBar+
        '</div>'+
      '</div>'+
      '<div style="display:flex;gap:6px;margin-top:10px">'+
        '<button onclick="toggleAdStatus('+ad.id+')" class="btn btn-secondary btn-sm">'+
          (ad.status==='live'?'&#x23F8; Pause':'&#x25B6; Resume')+
        '</button>'+
        '<button onclick="editAd('+ad.id+')" class="btn btn-secondary btn-sm">&#x270F; Edit</button>'+
        '<button onclick="viewAdInsights('+ad.id+')" class="btn btn-secondary btn-sm">&#x1F4CA; Insights</button>'+
      '</div>'+
    '</div>';
  }).join('');
  return '<div style="padding:16px">'+
    '<div class="sec-hd"><div class="sec-title">My Ads</div>'+
    '<button onclick="go(\'create\')" class="btn btn-primary btn-sm">+ New</button></div>'+
    adRows+
  '</div>';
}

function toggleAdStatus(id){
  var ad=D.ads.filter(function(a){return a.id===id;})[0];
  if(!ad)return;
  ad.status=ad.status==='live'?'paused':'live';
  go('ads');
  toast(ad.status==='live'?'Ad resumed!':'Ad paused.','suc');
}
window.toggleAdStatus=toggleAdStatus;

function editAd(id){toast('Edit mode coming soon!','i');}
window.editAd=editAd;

function viewAdInsights(id){
  var ad=D.ads.filter(function(a){return a.id===id;})[0];
  if(!ad)return;
  var total=(ad.rxn.fire||0)+(ad.rxn.funny||0)+(ad.rxn.wow||0)+(ad.rxn.deal||0)||1;
  alert('Insights: '+ad.title+'\nClicks: '+fmt(ad.clicks)+'\nApproval: '+ad.approval+'%\nTop reaction: '+(ad.rxn.fire>ad.rxn.deal?'\uD83D\uDD25 Fire (desire)':'\uD83C\uDFF7 Deal (value)'));
}
window.viewAdInsights=viewAdInsights;

// ── ANALYTICS ──

function applyWinningVariant(adId){
  var ad=D.ads.filter(function(a){return a.id===parseInt(adId);})[0];
  if(ad&&ad.abTest){
    var winner=ad.abTest.aVotes>ad.abTest.bVotes?ad.abTest.a:ad.abTest.b;
    ad.title=winner;
    delete ad.abTest;
    toast('Applied winning variant: '+winner,'suc');
    rp('analytics');
  }
}
window.applyWinningVariant=applyWinningVariant;
function rAnalytics(){
  var totalClicks=D.ads.reduce(function(s,a){return s+a.clicks;},0);
  var totalSpend=D.ads.reduce(function(s,a){return s+a.spend;},0);
  var cpc=totalClicks>0?(totalSpend/totalClicks).toFixed(2):'0.00';
  var rxnTotals={fire:0,funny:0,wow:0,deal:0};
  for(var i=0;i<D.ads.length;i++){var r=D.ads[i].rxn;rxnTotals.fire+=r.fire||0;rxnTotals.funny+=r.funny||0;rxnTotals.wow+=r.wow||0;rxnTotals.deal+=r.deal||0;}
  var rxnTotal=rxnTotals.fire+rxnTotals.funny+rxnTotals.wow+rxnTotals.deal||1;
  var mLabels=['\uD83D\uDD25 Fire','\uD83D\uDE02 Funny','\uD83E\uDD2F Wow','\uD83C\uDFF7 Deal'];
  var mVals=[rxnTotals.fire,rxnTotals.funny,rxnTotals.wow,rxnTotals.deal];

function rSchedule(){

  if(!D.schedule)D.schedule={days:[0,1,2,3,4],hours:[0,1,2,3]};

    var on=D.schedule.days.indexOf(i)>=0;

  }).join('');
  var hourBtns=hours.map(function(h,i){

    return '<button onclick="toggleHour('+i+')" style="flex:1;padding:7px 2px;border:1.5px solid '+(on?'var(--cy)':'var(--border)')+';border-radius:8px;background:'+(on?'rgba(0,229,255,.1)':'transparent')+';color:'+(on?'var(--cy)':'var(--t3)')+';font-size:10px;font-weight:700;cursor:pointer;font-family:var(--f)">'+h+'</button>';

    '<div class="sec-hd"><div class="sec-title">\uD83D\uDCC5 Ad Scheduling</div></div>'+
    '<div class="card">'+
      '<div style="font-size:12px;font-weight:800;margin-bottom:10px">Active Days</div>'+
      '<div style="display:flex;gap:4px;margin-bottom:16px">'+dayBtns+'</div>'+
      '<div style="font-size:12px;font-weight:800;margin-bottom:10px">Active Hours (Time Slots)</div>'+
      '<div style="display:flex;gap:4px;margin-bottom:16px">'+hourBtns+'</div>'+
      '<div style="background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);border-radius:10px;padding:10px;margin-bottom:12px;font-size:11px;color:var(--t2)">'+
        '\uD83D\uDCA1 Ads active '+activeDays+' days/week during '+activeHours+' hour slots. Budget pauses automatically outside these times.'+
      '</div>'+
      '<button onclick="saveSchedule()" class="btn btn-primary" style="width:100%;padding:13px">Save Schedule</button>'+
    '</div>'+
  '</div>';

function toggleDay(i){if(!D.schedule)D.schedule={days:[0,1,2,3,4],hours:[0,1,2,3]};var idx=D.schedule.days.indexOf(i);if(idx>=0)D.schedule.days.splice(idx,1);else D.schedule.days.push(i);go('schedule');}
function toggleHour(i){if(!D.schedule)D.schedule={days:[0,1,2,3,4],hours:[0,1,2,3]};var idx=D.schedule.hours.indexOf(i);if(idx>=0)D.schedule.hours.splice(idx,1);else D.schedule.hours.push(i);go('schedule');}

          '<div style="font-size:12px;font-weight:700;margin-bottom:8px">'+t.variantA+'</div>'+
          '<div style="font-size:18px;font-weight:900;color:var(--rd)">'+pctA+'%</div>'+
          '<div style="font-size:10px;color:var(--t3)">'+t.clicksA+' clicks &middot; '+t.votesA+' votes</div>'+
          '<div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px"><div style="width:'+pctA+'%;height:100%;background:var(--rd);border-radius:2px"></div></div>'+
        '</div>'+
        '<div style="background:rgba(0,229,255,.08);border:1.5px solid '+(winner==='B'?'var(--cy)':'var(--border)')+';border-radius:12px;padding:12px">'+
          '<div style="font-size:10px;font-weight:800;color:var(--cy);margin-bottom:4px">VERSION B'+(winner==='B'?' \uD83C\uDFC6':'')+' </div>'+
          '<div style="font-size:12px;font-weight:700;margin-bottom:8px">'+t.variantB+'</div>'+
          '<div style="font-size:18px;font-weight:900;color:var(--cy)">'+pctB+'%</div>'+
          '<div style="font-size:10px;color:var(--t3)">'+t.clicksB+' clicks &middot; '+t.votesB+' votes</div>'+
          '<div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px"><div style="width:'+pctB+'%;height:100%;background:var(--cy);border-radius:2px"></div></div>'+
        '</div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--t2);text-align:center;margin-bottom:10px">Version '+winner+' is winning with '+Math.max(pctA,pctB)+'% of engagement</div>'+
      '<button onclick="pickWinner()" class="btn btn-primary" style="width:100%;padding:11px;font-size:13px">Apply Winner to Campaign</button>'+
    '</div>';
  }).join('');
  return '<div style="padding:16px"><div class="sec-hd"><div class="sec-title">\uD83E\uDDEA A/B Tests</div></div>'+testHtml+'</div>';
}

        '<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:var(--cyan)">'+c.clicks.toLocaleString()+'</div><div style="font-size:10px;color:var(--t3)">Clicks</div></div>'+
        '<div style="text-align:center"><div style="font-size:16px;font-weight:900;color:var(--gold)">'+Math.round(c.clicks/c.impressions*100)+'%</div><div style="font-size:10px;color:var(--t3)">CTR</div></div>'+
      '</div>'+

window.rCampaign=rCampaign;


function rScheduling(){
  var timeSlots=['All day','Morning (6am-12pm)','Afternoon (12pm-6pm)','Evening (6pm-11pm)','Night (11pm-6am)'];
  var days=['M','T','W','T','F','S','S'];
  var timeBtns='';
  for(var ti=0;ti<timeSlots.length;ti++){
    var isFst=ti===0;
    timeBtns+='<button style="background:'+(isFst?'rgba(255,45,85,.2)':'rgba(255,255,255,.05)')+';border:1px solid '+(isFst?'var(--red)':'var(--border)')+';border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--text);cursor:pointer;font-family:var(--font);margin-bottom:4px">'+timeSlots[ti]+'</button> ';
  }
  var dayBtns='';
  for(var di=0;di<days.length;di++){
    var isWk=di<5;
    dayBtns+='<div style="width:36px;height:36px;border-radius:50%;background:'+(isWk?'rgba(255,45,85,.2)':'rgba(255,255,255,.05)')+';border:1.5px solid '+(isWk?'var(--red)':'var(--border)')+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;cursor:pointer">'+days[di]+'</div>';
  }
  return '<div class="sec-hd"><div><div class="sec-title">&#x23F0; Ad Scheduling</div><div class="sec-sub">Control when your ads run</div></div></div>'+
    '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px">'+
      '<div style="font-size:13px;font-weight:800;margin-bottom:12px">Air Phantom X &#x2014; Schedule</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'+
        '<div><label style="font-size:11px;color:var(--t3);display:block;margin-bottom:4px">Start date</label>'+
        '<input type="date" style="width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--font)"></div>'+
        '<div><label style="font-size:11px;color:var(--t3);display:block;margin-bottom:4px">End date</label>'+
        '<input type="date" style="width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--font)"></div>'+
      '</div>'+
      '<div style="margin-bottom:12px"><label style="font-size:11px;color:var(--t3);display:block;margin-bottom:6px">Active hours</label>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap">'+timeBtns+'</div></div>'+
      '<div style="margin-bottom:12px"><label style="font-size:11px;color:var(--t3);display:block;margin-bottom:6px">Active days</label>'+
      '<div style="display:flex;gap:6px">'+dayBtns+'</div></div>'+
      '<button class="btn btn-primary" onclick="toast(\'Schedule saved!\',\'suc\')">Save Schedule</button>'+
    '</div>';
}

function checkStockAlerts(){
  var alerts=[];
  for(var i=0;i<D.ads.length;i++){
    var ad=D.ads[i];
    if(ad.stock&&ad.stockLeft!==null&&ad.stockLeft!==undefined){
      var pct=Math.round((ad.stockLeft/ad.stock)*100);
      if(ad.stockLeft===0){alerts.push({type:'error',icon:'\u26D4',msg:'<b>'+ad.title+'</b> is sold out!',time:'just now'});}
      else if(pct<=10){alerts.push({type:'warning',icon:'\u26A0\uFE0F',msg:'<b>'+ad.title+'</b> almost sold out — '+ad.stockLeft+' left',time:'just now'});}
    }
  }
  return alerts;
}
window.checkStockAlerts=checkStockAlerts;
